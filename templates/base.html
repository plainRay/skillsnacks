<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#a0522d">
    <link rel="manifest" href="{{ url_for('static', filename='pwa/manifest.json') }}">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div class="shell site-header__inner">
        <div class="nav-left">
          <a class="brand" href="{{ url_for('home') }}">{{ site_name }}</a>
        </div>
        <div class="nav-center">
          <form action="{{ url_for('search') }}" method="get" class="nav-search" role="search">
            <label class="sr-only" for="nav-search">Search lessons</label>
            <input
              id="nav-search"
              type="search"
              name="q"
              value="{{ request.args.get('q', '') if request else '' }}"
              placeholder="{{ global_search_placeholder }}"
            >
          </form>
        </div>
        <div class="nav-right">
          <p class="nav-streak" data-streak-count data-today="{{ global_today_string }}">🔥 0 Day Curiosity Streak</p>
          <nav class="site-nav" aria-label="Primary">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('topics') }}">Topics</a>
            <a href="{{ url_for('daily') }}">Daily</a>
            <a href="{{ url_for('random_lesson') }}">Random</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="shell page-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer shell">
      <p>Short lessons for building a daily curiosity habit.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/speech.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/pwa-install.js') }}" defer></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js");
        });
      }
    </script>
  </body>
</html>
